name: Sincronizar WooCommerce Agis Agendado

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'  # 10:00 UTC = 07:00 BR
    - cron: '0 14 * * *'  # 14:00 UTC = 11:00 BR
    - cron: '0 18 * * *'  # 18:00 UTC = 15:00 BR
    - cron: '0 22 * * *'  # 22:00 UTC = 19:00 BR

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas woocommerce

      - name: Rodar o script de sincronização
        env:
          WC_CONSUMER_KEY:    ${{ secrets.WC_CONSUMER_KEY }}
          WC_CONSUMER_SECRET: ${{ secrets.WC_CONSUMER_SECRET }}
          AGIS_TOKEN:         ${{ secrets.AGIS_TOKEN }}
        run: python automacao.py
