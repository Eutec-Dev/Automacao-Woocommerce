name: Sincronizar WooCommerce Agis Agendado

on:
  workflow_dispatch: # Permite execução manual via interface do GitHub
  schedule:
    - cron: '0 10 * * *'  # 10:00 UTC = 07:00 BR (Horário de Brasília)
    - cron: '0 14 * * *'  # 14:00 UTC = 11:00 BR (Horário de Brasília)
    - cron: '0 18 * * *'  # 18:00 UTC = 15:00 BR (Horário de Brasília)
    - cron: '0 22 * * *'  # 22:00 UTC = 19:00 BR (Horário de Brasília)

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4 # Atualizado para v4

      - name: Instalar Python
        uses: actions/setup-python@v5 # Atualizado para v5
        with:
          python-version: '3.10' # Mantenha 3.10 ou a versão específica que você usa

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          # Instala as dependências do seu script
          pip install requests pandas woocommerce
          # Ou, se você criar um requirements.txt:
          # pip install -r requirements.txt

      - name: Rodar o script de sincronização
        # Certifique-se de que 'scripts/update_products.py' é o caminho correto para o seu script
        run: python scripts/update_products.py
